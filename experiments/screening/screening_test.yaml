# Screening experiment v1 – NVV pipeline parameter screening
#
# Varies key VAD (Step 4) and NVV (Step 7) parameters across their full
# extreme ranges via a cartesian product grid. Each combination becomes one
# run, giving a broad coverage of the parameter space.
#
# Run with:
#   python run_experiments.py \
#       --config ./config/config.yaml \
#       --experiment ./experiments/screening_v1.yaml

experiment: parameter_screening_test

grid:
  pipeline.4_vad.vad_threshold: [0.20]  # emilia: 0.20
  pipeline.4_vad.vad_min_silence_ms: [50] # random?
  pipeline.7_nvv.max_duration: [null, 6.5] # longest VOCALS segment is 6.5s, so we test if performance increases when we exclude longer segments
  pipeline.7_nvv.dedup_overlap_ratio: [0.7] # randomly chosen around the default of 0.7